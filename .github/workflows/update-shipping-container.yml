name: Update Shipping Container

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Shipping Container version to update to (leave empty for latest)'
        required: false
        default: ''
  repository_dispatch:
    types:
      - shipping-container-updated

jobs:
  update:
    name: Update Shipping Container in modpack
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packwiz
        run: |
          go install github.com/packwiz/packwiz@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Update shipping-container
        run: packwiz update shipping-container

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update shipping-container mod\n\nCo-Authored-By: Paperclip <noreply@paperclip.ing>"
          branch: main
