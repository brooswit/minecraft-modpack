name: Update Deep Nether

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Deep Nether version to update to (leave empty for latest)'
        required: false
        default: ''
  repository_dispatch:
    types:
      - deep-nether-updated

jobs:
  update:
    name: Update Deep Nether in modpack
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packwiz
        run: |
          go install github.com/packwiz/packwiz@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Update deep-nether
        run: packwiz update deep-nether

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update deep-nether mod\n\nCo-Authored-By: Paperclip <noreply@paperclip.ing>"
          branch: main
