name: Publish Modpack

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install packwiz
        run: go install github.com/packwiz/packwiz@latest

      - name: Build .mrpack
        run: ./build.sh
        env:
          PACKWIZ_BIN: packwiz

      - name: Determine version
        id: version
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          echo "version_id=snapshot-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Rename mrpack with version
        run: mv dist/InfrastructureSickos.mrpack "dist/InfrastructureSickos-${{ steps.version.outputs.version_id }}.mrpack"

      - name: Publish to Modrinth
        id: publish
        env:
          MODRINTH_API_TOKEN: ${{ secrets.MODRINTH_API_TOKEN }}
          MODRINTH_PROJECT_ID: ${{ secrets.MODRINTH_PROJECT_ID }}
        run: |
          set -euo pipefail
          VERSION_ID="${{ steps.version.outputs.version_id }}"
          MRPACK_FILE="dist/InfrastructureSickos-${VERSION_ID}.mrpack"

          DATA=$(python3 -c "
          import json
          data = {
              'name': 'InfrastructureSickos ${VERSION_ID}',
              'version_number': '${VERSION_ID}',
              'version_type': 'beta',
              'project_id': '${MODRINTH_PROJECT_ID}',
              'dependencies': [],
              'game_versions': ['1.20.1'],
              'loaders': ['forge'],
              'featured': False,
              'file_parts': ['mrpack']
          }
          print(json.dumps(data))
          ")

          RESPONSE=$(curl -sf \
            -H "Authorization: ${MODRINTH_API_TOKEN}" \
            -F "data=${DATA}" \
            -F "mrpack=@${MRPACK_FILE};type=application/zip;filename=$(basename ${MRPACK_FILE})" \
            "https://api.modrinth.com/v2/version")

          MODRINTH_VERSION_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "Published Modrinth version: ${MODRINTH_VERSION_ID}"
          echo "modrinth_version_id=${MODRINTH_VERSION_ID}" >> "$GITHUB_OUTPUT"

      - name: Trigger server deploy
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.INFRA_BOT_PAT }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'infrastructureSickos',
              repo: 'server',
              workflow_id: 'deploy.yml',
              ref: 'main'
            });
