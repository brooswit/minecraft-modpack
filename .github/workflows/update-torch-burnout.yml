name: Update Torch Burnout

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Torch Burnout version to update to (leave empty for latest)'
        required: false
        default: ''
  repository_dispatch:
    types:
      - torch-burnout-updated

jobs:
  update:
    name: Update Torch Burnout in modpack
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packwiz
        run: |
          go install github.com/packwiz/packwiz@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Update torch-burnout
        run: packwiz update torch-burnout

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update torch-burnout mod\n\nCo-Authored-By: Paperclip <noreply@paperclip.ing>"
          branch: main
