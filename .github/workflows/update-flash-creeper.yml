name: Update Flash Creeper

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Flash Creeper version to update to (leave empty for latest)'
        required: false
        default: ''
  repository_dispatch:
    types:
      - flash-creeper-updated

jobs:
  update:
    name: Update Flash Creeper in modpack
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packwiz
        run: |
          go install github.com/packwiz/packwiz@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Update flash-creeper
        run: packwiz update flash-creeper

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update flash-creeper mod\n\nCo-Authored-By: Paperclip <noreply@paperclip.ing>"
          branch: main
